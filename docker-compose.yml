services:
  app:
    image: ${APP_IMAGE:-chess-app:latest}
    container_name: chess-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"

  nginx:
    image: nginx:1.27-alpine
    container_name: chess-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
